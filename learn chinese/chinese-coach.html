<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>СИГТќЄ Coach Рђћ Taiwan Edition</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=Inter:wght@400;500;600&display=swap');
/* РћђРћђ DESIGN TOKENS РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
:root{
/* surfaces */
--c-void:#08090B;--c-ash:#0F1115;--c-iron:#181B22;--c-steel:#232730;--c-forge:#2E3340;
/* text */
--c-bone:#E2DDD6;--c-smoke:#7A8090;--c-rune:#3D4250;
/* accents */
--c-ember:#C8692A;--c-ember-hi:#E07B35;--c-frost:#3DBCB8;--c-frost-lo:#2A8A87;--c-gold:#B8962E;
/* semantic */
--c-ok:#3D9E6A;--c-fail:#B84040;
/* tone colors */
--t1:#E07B35;--t2:#3DBCB8;--t3:#3D9E6A;--t4:#B84040;--t5:#7A8090;
/* radii */
--r-sm:3px;--r-md:5px;--r-lg:8px;
/* depth */
--shadow-card:0 2px 8px rgba(0,0,0,0.45);
--glow-ember:0 0 18px rgba(200,105,42,0.22);
--glow-frost:0 0 14px rgba(61,188,184,0.18);
/* timing */
--t-fast:150ms cubic-bezier(0.25,0,0.4,1);
--t-normal:300ms cubic-bezier(0.25,0,0.4,1);
/* РћђРћђ legacy aliases Рђћ keep all JS-generated HTML working РћђРћђ */
--bg:var(--c-void);--card:var(--c-ash);--card2:var(--c-iron);
--txt:var(--c-bone);--mut:var(--c-smoke);--acc:var(--c-ember);
--green:var(--c-ok);--red:var(--c-fail);--gold:var(--c-gold);
--teal:var(--c-frost);--blue:#4f8fe8;--purple:#9a6fe0;
}
/* РћђРћђ RESET РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
*{box-sizing:border-box;margin:0;padding:0}
/* РћђРћђ GLOBAL РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
body{background:var(--c-void);color:var(--c-bone);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;min-height:100vh}
.hanzi{font-family:'Noto Serif TC','Microsoft JhengHei','PingFang TC',serif}
/* РћђРћђ HEADER РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
header{display:flex;align-items:center;gap:10px;padding:9px 20px;border-bottom:1px solid var(--c-steel);flex-wrap:wrap;background:var(--c-ash)}
header h1{font-size:14px;font-weight:500;white-space:nowrap;letter-spacing:0.03em;color:var(--c-bone)}
header h1 span{color:var(--c-ember)}
/* РћђРћђ NAV РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
nav{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:var(--c-rune);padding:6px 11px 5px;cursor:pointer;font-size:13px;font-family:inherit;line-height:1.2;transition:color var(--t-fast),border-color var(--t-fast)}
nav button:hover{color:var(--c-smoke)}
nav button.on{color:var(--c-bone);border-bottom-color:var(--c-ember)}
/* РћђРћђ HUD / SCRIPT РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
#scriptBtn{background:var(--c-iron);border:1px solid var(--c-steel);color:var(--c-gold);padding:4px 9px;border-radius:var(--r-sm);cursor:pointer;font-size:13px}
#hud{margin-left:auto;display:flex;gap:10px;align-items:center;font-size:13px;color:var(--c-gold);font-weight:600;white-space:nowrap}
/* РћђРћђ SESSION BAR РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
#sessbar{display:none;position:sticky;top:0;z-index:50;background:var(--c-iron);border-bottom:2px solid var(--c-ember);padding:10px 20px}
#sessbar b{color:var(--c-gold)}
#sessleft{font-variant-numeric:tabular-nums;font-size:18px;font-weight:700}
#sessleft.over{color:var(--c-fail);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.4}}
.sbar{flex:1;height:3px;background:var(--c-steel);border-radius:2px;overflow:hidden;min-width:80px}
.sbar i{display:block;height:100%;background:var(--c-ember);border-radius:2px}
/* РћђРћђ LAYOUT РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
main{max-width:860px;margin:0 auto;padding:20px 16px 80px;position:relative}
/* РћђРћђ CARD TIERS РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.box{background:var(--c-ash);border:1px solid var(--c-steel);border-radius:var(--r-md);padding:20px;margin-bottom:12px;box-shadow:var(--shadow-card)}
/* Tier 1 Рђћ Forge hero */
.chamber-card{position:relative;background:var(--c-ash);border:1px solid var(--c-steel);border-top:1px solid rgba(200,105,42,0.3);border-radius:var(--r-md);padding:28px 24px 24px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-card)}
.rune-wm{position:absolute;top:12px;right:18px;font-size:80px;line-height:1;color:var(--c-bone);opacity:0.05;pointer-events:none;user-select:none;font-family:'Noto Serif TC',serif}
/* РћђРћђ BUTTONS РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.btn{background:transparent;border:1px solid var(--c-steel);color:var(--c-bone);padding:9px 16px;border-radius:var(--r-md);cursor:pointer;font-size:14px;font-family:'Inter',system-ui,sans-serif;transition:background var(--t-fast),border-color var(--t-fast)}
.btn:hover{background:var(--c-forge);border-color:var(--c-smoke)}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:.4;cursor:default;transform:none}
.btn.acc{background:var(--c-ember);border-color:var(--c-ember);color:var(--c-void);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;box-shadow:var(--glow-ember)}
.btn.acc:hover{background:var(--c-ember-hi);border-color:var(--c-ember-hi)}
.btn.grn{background:var(--c-ok);border-color:var(--c-ok);color:#fff}
.btn.red{background:var(--c-fail);border-color:var(--c-fail);color:#fff}
.btn.sm{padding:4px 9px;font-size:12px}
.btn.big{font-size:18px;padding:13px 26px}
/* ghost Рђћ text-only low-priority */
.btn-ghost{background:none;border:none;color:var(--c-smoke);font-size:12px;font-family:'Inter',system-ui,sans-serif;cursor:pointer;padding:5px 0;letter-spacing:0.03em;transition:color var(--t-fast)}
.btn-ghost:hover{color:var(--c-bone)}
/* Forge session primary CTA */
.btn-session-primary{display:block;width:100%;background:var(--c-ember);border:none;color:var(--c-void);font-weight:700;font-size:14px;font-family:'Inter',system-ui,sans-serif;letter-spacing:0.07em;text-transform:uppercase;padding:16px 20px;border-radius:var(--r-md);cursor:pointer;text-align:left;box-shadow:var(--glow-ember);transition:background var(--t-fast)}
.btn-session-primary:hover{background:var(--c-ember-hi)}
.btn-session-primary:active{transform:scale(0.98)}
.btn-session-primary small{display:block;font-size:11px;font-weight:400;letter-spacing:0.01em;text-transform:none;opacity:0.65;margin-top:3px}
/* РћђРћђ FORGE HOME LAYOUT РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.mode-stack{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.mode-alts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.forge-tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--c-steel)}
.stats-strip{display:flex;gap:0;padding:10px 16px;background:var(--c-ash);border:1px solid var(--c-steel);border-radius:var(--r-md);margin-bottom:12px;overflow-x:auto}
.stat-item{flex:1;text-align:center;padding:4px 6px;border-right:1px solid var(--c-steel)}
.stat-item:last-child{border-right:none}
.stat-val{display:block;font-size:19px;font-weight:600;color:var(--c-bone);line-height:1.2}
.stat-lbl{display:block;font-size:10px;color:var(--c-smoke);text-transform:uppercase;letter-spacing:0.08em;margin-top:1px}
.label-caps{font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--c-smoke);display:block;margin-bottom:4px}
.forge-footer{text-align:center;padding:18px 0 6px;border-top:1px solid var(--c-steel);margin-top:8px}
/* РћђРћђ TYPOGRAPHY РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.bigh{font-size:72px;text-align:center;line-height:1.2;margin:16px 0;font-family:'Noto Serif TC','Microsoft JhengHei','PingFang TC',serif}
.pin{font-size:18px;text-align:center;color:var(--c-bone);margin:6px 0;letter-spacing:0.04em;opacity:0.85}
.eng{font-size:15px;text-align:center;margin:6px 0;color:var(--c-smoke)}
.mut{color:var(--c-smoke)}.gold{color:var(--c-gold)}.grn-t{color:var(--c-ok)}.red-t{color:var(--c-fail)}
.center{text-align:center}
/* РћђРћђ TONE COLORS РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.t1{color:#E07B35}.t2{color:#3DBCB8}.t3{color:#3D9E6A}.t4{color:#B84040}.t5{color:#7A8090}
/* РћђРћђ MCQ РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.opts .btn{padding:13px;font-size:16px}
.opts .btn.hit{background:var(--c-ok);border-color:var(--c-ok);color:#fff}
.opts .btn.miss{background:var(--c-fail);border-color:var(--c-fail);color:#fff}
/* РћђРћђ FORMS РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
input[type=text],input[type=number],select{background:var(--c-iron);border:1px solid var(--c-steel);color:var(--c-bone);padding:8px 11px;border-radius:var(--r-md);font-size:14px;font-family:'Inter',system-ui,sans-serif}
input[type=text]{width:100%}
input[type=range]{accent-color:var(--c-ember)}
/* РћђРћђ STAT (used in session results + misc) РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.stat{display:inline-block;background:var(--c-iron);border:1px solid var(--c-steel);border-radius:var(--r-md);padding:10px 14px;margin:4px;text-align:center;min-width:80px}
.stat b{display:block;font-size:21px;color:var(--c-bone)}
.stat span{font-size:10px;color:var(--c-smoke);text-transform:uppercase;letter-spacing:0.06em}
.set{display:flex;gap:8px;align-items:center;font-size:13px}
/* РћђРћђ TABLES РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
table{width:100%;border-collapse:collapse;font-size:14px}
td,th{padding:8px 6px;border-bottom:1px solid var(--c-steel);text-align:left}
th{color:var(--c-smoke);font-size:11px;letter-spacing:0.06em;text-transform:uppercase}
tr.wrow{cursor:pointer}
tr.wrow:hover td{background:var(--c-iron)}
/* РћђРћђ HANDWRITING РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.wchars{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:16px 0}
.wbox{position:relative;background:#f7f3ec;border-radius:var(--r-md)}
.wguide{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(60,70,85,0.35);pointer-events:none;user-select:none;font-family:'Noto Serif TC','Microsoft JhengHei','PingFang TC',serif;line-height:1;display:none}
.wguide.visible{display:block}
/* РћђРћђ TAGS РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.tag{font-size:10px;background:var(--c-iron);color:var(--c-smoke);border-radius:var(--r-sm);padding:2px 6px;letter-spacing:0.04em;text-transform:uppercase}
.tag.p{color:#9a6fe0;border:1px solid rgba(154,111,224,0.35)}
.tag.tw{color:var(--c-frost);border:1px solid rgba(61,188,184,0.35)}
/* РћђРћђ FEEDBACK РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.fb{text-align:center;font-size:17px;margin-top:12px;min-height:24px}
/* РћђРћђ PINYIN LAB РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.tonegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin:12px 0}
/* РћђРћђ XP / HEAT РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.xpbar{height:3px;background:var(--c-steel);border-radius:2px;overflow:hidden;margin:5px 0}
.xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--c-gold),var(--c-ember))}
.heat{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,11px);gap:2px;justify-content:start;margin:10px 0}
.heat i{width:11px;height:11px;border-radius:2px;background:var(--c-steel)}
.heat i.h1{background:rgba(61,158,106,0.22)}.heat i.h2{background:rgba(61,158,106,0.48)}.heat i.h3{background:rgba(61,158,106,0.74)}.heat i.h4{background:#3D9E6A}
/* РћђРћђ GATE CHAMBER (Stage 4) РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
/* Scenario list cards */
.gate-card{background:var(--c-ash);border:1px solid var(--c-steel);border-left:3px solid rgba(61,188,184,0.25);border-radius:var(--r-md);padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:background var(--t-fast),border-left-color var(--t-fast);box-shadow:var(--shadow-card)}
.gate-card:hover{background:var(--c-iron);border-left-color:var(--c-frost)}
.gate-card-hz{font-family:'Noto Serif TC','Microsoft JhengHei','PingFang TC',serif;font-size:22px;color:var(--c-bone);margin-bottom:5px}
.gate-card-scene{font-size:13px;color:var(--c-smoke);margin-bottom:6px}
.gate-card-tag{font-size:11px;color:var(--c-rune);letter-spacing:0.08em;text-transform:uppercase}
/* Open dialogue Рђћ scene header */
.scene-header{background:var(--c-ash);border:1px solid var(--c-steel);border-top:2px solid rgba(61,188,184,0.3);border-radius:var(--r-md);padding:18px 18px 14px;margin-bottom:10px;box-shadow:var(--shadow-card)}
.scene-eyebrow{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--c-frost);font-weight:600;margin-bottom:6px}
.scene-title-hz{font-family:'Noto Serif TC','Microsoft JhengHei',serif;font-size:20px;color:var(--c-bone);margin-bottom:4px}
.scene-desc{font-size:13px;color:var(--c-smoke);margin-bottom:12px}
/* Screenplay line style Рђћ cinematic, not chat bubbles */
.bub{width:100%;padding:10px 14px;border-left:3px solid transparent;margin:1px 0;font-size:17px;line-height:1.5;cursor:pointer;transition:background var(--t-fast),border-left-color var(--t-fast)}
.bub:hover{background:var(--c-iron)}
.bub.a{border-left-color:var(--c-steel)}
.bub.b{border-left-color:rgba(61,188,184,0.35);background:rgba(61,188,184,0.03)}
.bub.b:hover{background:var(--c-iron)}
.bub .bp{font-size:12px;display:block;color:var(--c-rune);margin-top:3px}
.bub .be{font-size:11px;color:var(--c-rune);opacity:0.65;display:block;margin-top:2px}
.bub.cur{background:rgba(61,188,184,0.07);border-left-color:var(--c-frost);outline:none}
/* РћђРћђ MARKS CHAMBER (Stage 5) РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.write-chamber{background:var(--c-ash);border:1px solid var(--c-steel);border-radius:var(--r-md);padding:20px 20px 16px;margin-bottom:10px;box-shadow:var(--shadow-card)}
.write-controls{display:flex;gap:8px;align-items:center;padding-bottom:12px;border-bottom:1px solid var(--c-steel);margin-bottom:14px}
.write-input{flex:1;min-width:120px}
.write-word{text-align:center;padding:2px 0 12px;border-bottom:1px solid var(--c-steel);margin-bottom:2px}
.write-word-pin{font-size:16px;color:var(--c-smoke);letter-spacing:0.04em;margin-bottom:3px}
.write-word-eng{font-size:12px;color:var(--c-rune);margin-bottom:8px}
.write-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--c-steel);margin-top:6px}
.write-hint{font-size:12px;color:var(--c-rune);margin-top:10px;text-align:center}
.rad-ref{background:var(--c-ash);border:1px solid var(--c-steel);border-radius:var(--r-md);overflow:hidden;margin-bottom:8px;box-shadow:var(--shadow-card)}
.rad-row{display:flex;gap:16px;align-items:flex-start;padding:14px 16px;border-bottom:1px solid var(--c-steel)}
.rad-row:last-child{border-bottom:none}
.rad-glyph{font-family:'Noto Serif TC','Microsoft JhengHei',serif;font-size:44px;line-height:1;min-width:60px;text-align:center;color:var(--c-bone);padding:10px 6px;background:var(--c-iron);border-radius:var(--r-sm);flex-shrink:0}
.rad-name{font-size:14px;font-weight:600;color:var(--c-bone);margin-bottom:3px}
.rad-desc{font-size:13px;color:var(--c-smoke);line-height:1.5;margin-bottom:8px}
.rad-examples{display:flex;gap:6px;flex-wrap:wrap}
.rad-quiz-card{background:var(--c-ash);border:1px solid var(--c-steel);border-radius:var(--r-md);padding:28px 20px 22px;text-align:center;box-shadow:var(--shadow-card)}
.rad-quiz-prompt{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--c-rune);margin-bottom:14px}
.rad-quiz-hz{font-family:'Noto Serif TC','Microsoft JhengHei','PingFang TC',serif;font-size:72px;line-height:1.1;color:var(--c-bone);margin:0 0 12px}
.wbtn-active{background:rgba(232,226,212,0.08);border-color:var(--c-smoke)}
/* РћђРћђ HUNT CHAMBER (Stage 6A) РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.hunt-header{background:var(--c-ash);border:1px solid var(--c-steel);border-top:2px solid rgba(200,105,42,0.3);border-radius:var(--r-md);padding:20px 20px 16px;margin-bottom:10px;box-shadow:var(--shadow-card)}
.hunt-eyebrow{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--c-rune);font-weight:600;margin-bottom:8px}
.hunt-sub{font-size:13px;color:var(--c-smoke);line-height:1.5;margin-bottom:12px}
.hunt-chips{display:flex;gap:4px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--c-steel)}
.hunt-section{background:var(--c-ash);border:1px solid var(--c-steel);border-radius:var(--r-md);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow-card)}
.hunt-sec-head{padding:16px 18px 14px;border-bottom:1px solid var(--c-steel)}
.hunt-sec-title{font-size:14px;font-weight:600;color:var(--c-bone);margin-bottom:4px}
.hunt-sec-intro{font-size:12px;color:var(--c-rune);line-height:1.5}
.hunt-lines{padding:0 18px}
.hunt-line{padding:16px 0;border-bottom:1px solid var(--c-steel)}
.hunt-line:last-child{border-bottom:none}
.hunt-hz{font-family:'Noto Serif TC','Microsoft JhengHei','PingFang TC',serif;font-size:24px;line-height:1.35;color:var(--c-bone);margin-bottom:5px}
.hunt-pin{font-size:14px;color:var(--c-smoke);letter-spacing:0.02em;margin-bottom:3px}
.hunt-eng{font-size:12px;color:var(--c-rune);line-height:1.4;margin-bottom:8px}
.hunt-actions{display:flex;gap:6px;align-items:center}
.hunt-footer{padding:14px 18px;border-top:1px solid var(--c-steel);display:flex;gap:8px;align-items:center}
/* РћђРћђ CORE CHAMBER (Stage 6B) РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.core-header{background:var(--c-ash);border:1px solid var(--c-steel);border-top:2px solid rgba(200,105,42,0.3);border-radius:var(--r-md);padding:20px 20px 16px;margin-bottom:10px;box-shadow:var(--shadow-card)}
.core-eyebrow{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--c-rune);font-weight:600;margin-bottom:8px}
.core-sub{font-size:13px;color:var(--c-smoke);line-height:1.5;margin-bottom:12px}
.core-chips{display:flex;gap:4px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--c-steel)}
.core-list{background:var(--c-ash);border:1px solid var(--c-steel);border-radius:var(--r-md);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow-card)}
.core-line{padding:18px 18px;border-bottom:1px solid var(--c-steel)}
.core-line:last-child{border-bottom:none}
.core-hz{font-family:'Noto Serif TC','Microsoft JhengHei','PingFang TC',serif;font-size:24px;line-height:1.35;color:var(--c-bone);margin-bottom:5px}
.core-pin{font-size:13px;color:var(--c-smoke);letter-spacing:0.04em;margin-bottom:3px}
.core-eng{font-size:12px;color:var(--c-rune);line-height:1.4;margin-bottom:10px}
.core-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.core-form{background:var(--c-iron);border:1px solid var(--c-steel);border-radius:var(--r-md);padding:16px;margin-top:10px}
.core-empty{text-align:center;padding:32px 20px;color:var(--c-rune);font-size:13px}
/* РћђРћђ ARCHIVE CHAMBER (Stage 7) РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.arc-header{background:var(--c-ash);border:1px solid var(--c-steel);border-top:2px solid rgba(184,150,46,0.3);border-radius:var(--r-md);padding:20px 20px 16px;margin-bottom:10px;box-shadow:var(--shadow-card)}
.arc-eyebrow{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--c-rune);font-weight:600;margin-bottom:8px}
.arc-sub{font-size:13px;color:var(--c-smoke);line-height:1.5;margin-bottom:14px}
.arc-tools{display:flex;gap:6px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--c-steel)}
.arc-section{background:var(--c-ash);border:1px solid var(--c-steel);border-radius:var(--r-md);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow-card)}
.arc-sec-head{padding:14px 18px;border-bottom:1px solid var(--c-steel);display:flex;align-items:center;gap:8px}
.arc-sec-title{font-size:13px;font-weight:600;color:var(--c-bone)}
.arc-sec-count{font-size:11px;color:var(--c-rune);padding:2px 8px;border:1px solid var(--c-steel);border-radius:10px}
.arc-miss-row{padding:13px 18px;border-bottom:1px solid var(--c-steel);display:flex;align-items:center;gap:12px}
.arc-miss-row:last-child{border-bottom:none}
.arc-miss-hz{font-family:'Noto Serif TC','Microsoft JhengHei','PingFang TC',serif;font-size:20px;color:var(--c-bone);min-width:36px}
.arc-miss-eng{font-size:12px;color:var(--c-rune);flex:1}
.arc-miss-count{font-size:13px;font-weight:700;color:var(--c-fail);white-space:nowrap}
.arc-miss-kinds{font-size:11px;color:var(--c-rune)}
.arc-miss-last{font-size:11px;color:var(--c-rune)}
.arc-log-item{padding:16px 18px;border-bottom:1px solid var(--c-steel)}
.arc-log-item:last-child{border-bottom:none}
.arc-log-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.arc-log-date{font-size:12px;font-weight:600;color:var(--c-bone);letter-spacing:0.04em}
.arc-log-body{font-size:13px;color:var(--c-smoke)}
.arc-log-body p{margin-top:4px;line-height:1.5}
.arc-empty{text-align:center;padding:28px 20px;color:var(--c-rune);font-size:13px;line-height:1.6}
/* РћђРћђ FORGE REPORT (Stage 7) РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.frep{background:var(--c-ash);border:1px solid var(--c-steel);border-top:2px solid rgba(61,188,184,0.25);border-radius:var(--r-md);padding:18px 20px;margin-bottom:10px;box-shadow:var(--shadow-card)}
.frep-head{display:flex;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--c-steel)}
.frep-eyebrow{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--c-frost);font-weight:600}
.frep-trend{margin-left:auto;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.frep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.frep-cell{background:var(--c-iron);border:1px solid var(--c-steel);border-radius:var(--r-md);padding:12px 14px}
.frep-cell-lbl{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--c-rune);margin-bottom:5px}
.frep-cell-val{font-size:13px;color:var(--c-bone)}
.frep-cell-note{font-size:11px;color:var(--c-rune);margin-top:3px}
.frep-at-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--c-rune);margin-bottom:8px}
.frep-at-row{display:flex;gap:8px;flex-wrap:wrap}
.frep-at-item{background:var(--c-iron);border:1px solid var(--c-steel);border-radius:var(--r-md);padding:10px 14px;text-align:center;min-width:72px}
.frep-at-hz{font-family:'Noto Serif TC','Microsoft JhengHei','PingFang TC',serif;font-size:20px;color:var(--c-bone);display:block}
.frep-at-miss{font-size:11px;color:var(--c-fail);font-weight:600;display:block;margin-top:2px}
.frep-at-eng{font-size:10px;color:var(--c-rune);display:block;margin-top:1px}
.frep-assess{font-size:13px;color:var(--c-bone);line-height:1.55;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--c-steel)}
/* РћђРћђ SENTENCE BUILDER РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.tiles{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:10px 0;min-height:50px}
.tile{background:var(--c-iron);border:1px solid var(--c-steel);border-radius:var(--r-sm);padding:9px 13px;font-size:20px;cursor:pointer;font-family:'Noto Serif TC','Microsoft JhengHei',serif;transition:border-color var(--t-fast)}
.tile:hover{border-color:var(--c-ember)}
.tile.ghost{opacity:.2;pointer-events:none}
.slotline{background:var(--c-void);border:1px dashed var(--c-steel);border-radius:var(--r-md);padding:10px;min-height:54px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
/* РћђРћђ SPEAKING РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.spk-ch{font-size:24px;letter-spacing:2px;font-family:'Noto Serif TC',serif}
.spk-ch .ok{color:var(--c-ok)}.spk-ch .bad{color:var(--c-fail)}
/* РћђРћђ CULTURAL NOTES РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.note{font-size:13px;color:var(--c-bone);background:var(--c-iron);border-left:2px solid var(--c-frost);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:9px 12px;margin:8px auto;max-width:600px;text-align:left;line-height:1.6;opacity:0.88}
.note.cult{border-left-color:var(--c-gold)}
.brk{font-size:13px;background:var(--c-iron);border-left:2px solid var(--c-rune);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:9px 12px;margin:8px auto;max-width:600px;text-align:left;line-height:1.6}
.brk b{font-size:19px;color:var(--c-gold)}
/* РћђРћђ RADICALS РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
.radcard{display:flex;gap:14px;align-items:flex-start}
.radglyph{font-size:40px;min-width:64px;text-align:center;background:var(--c-iron);border-radius:var(--r-md);padding:8px;color:var(--c-gold);font-family:'Noto Serif TC',serif}

.modegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-top:12px}

function newSb(){

}
function drawSb(){
const q=sb.q;

function animW(){

if(ws)ws.innerHTML='<span style="font-size:13px;color:var(--c-smoke)">'+msg+'</span>';

function quizW(hard){

const step=function(){
if(i>=writers.length){
bumpDone("write");touchStreak();speak(wWord);

if(misses>2&&wIdx>=0)recordMiss("writing",wIdx);

return}
const prog=writers.length>1?" ┬и "+(i+1)+"/"+writers.length:"";
const statusMsg=hard?"Memory mode active"+prog+". Draw the character from memory.":"Trace mode active"+prog+". Follow the guide strokes.";

};

}

function pinMatch(u,p){
if(/\d/.test(u)){
const a=numPinyin(p,true),b=numPinyin(p,false);
return u===a||u===b||u.replace(/v/g,"u")===a.replace(/v/g,"u")||u.replace(/v/g,"u")===b.replace(/v/g,"u");
}
const t=plainPinyin(p);
return u===t||u.replace(/v/g,"u")===t.replace(/v/g,"u");
}
function checkT(){
if(!tq||$("#tnext").style.display!=="none")return;
const v=$("#tinput").value.trim();if(!v)return;
let ok;
if(tMode==="pinyin"){
const u=v.toLowerCase().replace(/[\s'РђЎ]/g,"").replace(/u:/g,"v").replace(/├╝/g,"v").replace(/0/g,"5");
ok=pinMatch(u,tq.p)||pinMatch(u,tq.pAlt);
}else{
const c=cleanHanzi(v);
ok=[tq.h,tq.hAlt].some(h=>c===cleanHanzi(h)||c===cleanHanzi(T(h)));
}
tScore.n++;if(ok)tScore.ok++;
if(!ok)recordMiss("typing",tq.wi);
$("#tsc").textContent=tScore.ok+"/"+tScore.n;

let bq=null;
function genBoss(n){
const qs=[];const pool=lPool();
for(let k=0;k<n;k++){
const ty=rnd(["aw","eh","tn","as"]);
if(ty==="aw"){const qi=rnd(pool);
const confused=sessionConfusedIds().filter(i=>i!==qi&&W[i][2]!==W[qi][2]);
const fallback=shuffle(pool.filter(i=>i!==qi&&W[i][2]!==W[qi][2]&&!confused.includes(i)));
const dis=shuffle(confused.concat(fallback)).slice(0,3);
const opts=shuffle([{l:W[qi][2],ok:1},...dis.map(i=>({l:W[i][2],ok:0}))]);
qs.push({ty,prompt:"­Ъћі Listen Рђћ what does it mean?",audio:wHanzi(W[qi]),hz:wHanzi(W[qi]),pin:wPin(W[qi]),opts,qi});}
else if(ty==="eh"){const qi=rnd(pool);
const confused2=sessionConfusedIds().filter(i=>i!==qi&&wHanzi(W[i])!==wHanzi(W[qi]));
const fallback2=shuffle(pool.filter(i=>i!==qi&&wHanzi(W[i])!==wHanzi(W[qi])&&!confused2.includes(i)));
const dis=shuffle(confused2.concat(fallback2)).slice(0,3);
const opts=shuffle([{l:wHanzi(W[qi]),ok:1,hz:1},...dis.map(i=>({l:wHanzi(W[i]),ok:0,hz:1}))]);
qs.push({ty,prompt:'Which is "'+W[qi][2]+'"?',audio:null,hz:wHanzi(W[qi]),pin:wPin(W[qi]),opts,qi});}
else if(ty==="tn"){const qi=rnd(pool);const t=tone(syls(wPin(W[qi]))[0]||"");
const opts=[1,2,3,4,5].map(x=>({l:x===5?"neutral":"tone "+x,ok:x===t?1:0}));
qs.push({ty,prompt:"­Ъћі Tone of the first syllable?",audio:wHanzi(W[qi]),hz:wHanzi(W[qi]),pin:wPin(W[qi]),opts,qi});}
else{const qi=Math.floor(Math.random()*S.length);const dis=shuffle(S.filter((s,i)=>i!==qi)).slice(0,3);
const opts=shuffle([{l:S[qi][2],ok:1},...dis.map(s=>({l:s[2],ok:0}))]);
qs.push({ty,prompt:"­Ъћі Listen to the sentence Рђћ what does it mean?",audio:S[qi][0],hz:S[qi][0],pin:S[qi][1],opts});}
}
return qs;
}

'<div class="arc-sec-head">'+

'</div>'+
(log.length?
log.slice(0,20).map(function(e){
return '<div class="arc-log-item">'+
'<div class="arc-log-top">'+
'<span class="arc-log-date">'+e.date+'</span>'+
'<span class="tag">'+esc((MODES[e.mode]||{}).label||e.mode)+' \xb7 '+e.mins+' min</span>'+
'<span class="tag gold">+'+e.xp+' XP</span>'+
(e.aborted?'<span class="tag">ended early</span>':"")+
'</div>'+

(e.topic?'<p>Topic: <span class="hanzi">'+esc(e.topic)+'</span></p>':"")+

/* РћђРћђ BRAIN NODE РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
let bnOpen=false;
function getBrainPresenceState(){
try{
const brain=computeBrain();
if(brain.trend==="declining"&&(brain.weakTones.length||brain.atRiskWords.length))return "pressure";
if(brain.weakTones.length||brain.weakTypes.length||brain.atRiskWords.length)return "advisory";
if(["voice","gate","hunt"].indexOf(tab)>=0)return "observing";
return "idle";
}catch(e){return "idle"}
}
function getBrainPresenceMsg(){
const hasData=Object.keys(st.mistakes||{}).length>0||(st.lessonLog||[]).length>0;
if(!hasData)return "No pattern yet. Train longer and I'll have something real to read.";
try{
const brain=computeBrain();
const top3=weakIds().slice(0,3);
if(brain.trend==="declining"&&top3.length)return "Accuracy dropped. Your weakest words are due. Stabilize before adding more.";
if(brain.trend==="declining")return "Do not add more. Stabilize what is slipping.";
if(brain.weakTones.length>=2)return "Multiple tones are flagged. Drill contrast pairs before anything else.";
if(brain.weakTones.indexOf(3)!==-1)return "Tone 3 is unstable. Drill contrast with Tone 2 before moving on.";
if(brain.weakTones.indexOf(2)!==-1)return "Tone 2 needs more ear time. Prioritize listening in your next session.";
if(brain.weakTones.length===1&&brain.weakTones[0]===4)return "Tone 4 keeps dropping. Emphatic repetition only Рђћ do not add material.";
if(brain.weakTones.length===1&&brain.weakTones[0]===1)return "Tone 1 is flagged. It should be flat and held Рђћ check your pitch.";
if(top3.length)return "These words have slipped before and are due. Review them before anything else today.";
const wt=brain.weakTypes[0];
if(wt==="listen")return "Recognition is behind recall. More Echo time before you add new cards.";
if(wt==="card")return "Card recall is your weakest channel. Shorter reviews, higher frequency.";
if(wt==="type")return "Typed input keeps failing. Slow down Рђћ do not guess.";
if(wt==="speak")return "Output accuracy is low. More Voice practice before your next session.";
if(wt==="tone")return "Tone identification is flagged. Use Echo with slow audio.";
if(tab==="voice")return "I'm watching your recall. Keep the next round short.";
if(tab==="gate")return "You're ready for pressure here. Keep audio on.";
if(tab==="hunt")return "Career context loaded. Use this for real sentence patterns.";
if(brain.trend==="improving")return "Accuracy improved this week. You are ready for harder sentences.";
return "Pattern is stable. Push into Gate scenarios or harder vocabulary.";
}catch(e){return "No pattern yet. Complete a session first."}
}
function updateBrainNode(){
const btn=document.getElementById("vantaBtn");
if(!btn)return;
btn.className="bn-btn bn-"+getBrainPresenceState();
if(bnOpen){const msgEl=document.querySelector("#bnPanel .bn-msg");if(msgEl)msgEl.textContent=getBrainPresenceMsg();}
}
function toggleBrainPanel(){
bnOpen=!bnOpen;
const panel=document.getElementById("bnPanel");
if(!panel)return;
if(bnOpen){const msgEl=panel.querySelector(".bn-msg");if(msgEl)msgEl.textContent=getBrainPresenceMsg();panel.classList.add("open");}
else{panel.classList.remove("open");}
}
function renderBrainNode(){
const oldBn=document.getElementById("bn");if(oldBn)oldBn.remove();
const oldP=document.getElementById("bnPanel");if(oldP)oldP.remove();
const panel=document.createElement("div");panel.id="bnPanel";panel.className="bn-panel";
panel.innerHTML='<div class="bn-ph"><span class="bn-eyebrow">Vanta Node</span><span class="bn-dismiss" onclick="toggleBrainPanel()">close</span></div><div class="bn-msg"></div>';
document.body.appendChild(panel);
}
/* ================= INIT ================= */
renderNav();renderScriptBtn();renderHud();render();renderBrainNode();updateBrainNode();
</script>
