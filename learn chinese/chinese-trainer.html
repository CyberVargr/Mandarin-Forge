<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>中文 Trainer</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
<style>
:root{--bg:#10141c;--card:#1a2030;--card2:#222a3e;--txt:#e8ecf4;--mut:#8a94ab;--acc:#e4593b;--green:#3fae6a;--red:#d24545;--gold:#e0a93c;--blue:#4f8fe8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh}
.hanzi{font-family:"Microsoft YaHei","Noto Sans SC","Noto Sans TC","PingFang SC",sans-serif}
header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid #2a3248;flex-wrap:wrap}
header h1{font-size:20px}
header h1 span{color:var(--acc)}
nav{display:flex;gap:6px;flex-wrap:wrap}
nav button{background:none;border:1px solid #2a3248;color:var(--mut);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:14px}
nav button.on{background:var(--acc);border-color:var(--acc);color:#fff}
#scriptBtn{background:var(--card2);border:1px solid #34405e;color:var(--gold);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:14px}
#streak{margin-left:auto;color:var(--gold);font-size:14px;font-weight:600}
main{max-width:860px;margin:0 auto;padding:22px 16px 60px}
.box{background:var(--card);border:1px solid #2a3248;border-radius:14px;padding:20px;margin-bottom:16px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{background:var(--card2);border:1px solid #34405e;color:var(--txt);padding:10px 18px;border-radius:9px;cursor:pointer;font-size:15px}
.btn:hover{border-color:var(--acc)}
.btn.acc{background:var(--acc);border-color:var(--acc);color:#fff}
.btn.grn{background:var(--green);border-color:var(--green);color:#fff}
.btn.red{background:var(--red);border-color:var(--red);color:#fff}
.btn.sm{padding:5px 10px;font-size:13px}
.big{font-size:64px;text-align:center;line-height:1.3;margin:18px 0}
.pin{font-size:24px;text-align:center;color:var(--gold);margin:6px 0}
.eng{font-size:19px;text-align:center;margin:6px 0}
.mut{color:var(--mut)}.gold{color:var(--gold)}.grn-t{color:var(--green)}.red-t{color:var(--red)}
.center{text-align:center}
.t1{color:#ff7066}.t2{color:#5dd47a}.t3{color:#5aa8ff}.t4{color:#c98bff}.t5{color:#9aa3b5}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.opts .btn{padding:16px;font-size:17px}
.opts .btn.hit{background:var(--green);border-color:var(--green);color:#fff}
.opts .btn.miss{background:var(--red);border-color:var(--red);color:#fff}
input[type=text],input[type=number],select{background:var(--card2);border:1px solid #34405e;color:var(--txt);padding:10px 12px;border-radius:8px;font-size:17px}
input[type=text]{width:100%}
.stat{display:inline-block;background:var(--card2);border-radius:10px;padding:12px 18px;margin:4px;text-align:center;min-width:100px}
.stat b{display:block;font-size:26px}
.stat span{font-size:12px;color:var(--mut)}
.plan label{display:flex;gap:10px;align-items:center;padding:8px 4px;font-size:16px;cursor:pointer}
.plan input{width:18px;height:18px;accent-color:var(--acc)}
.set{display:flex;gap:8px;align-items:center;font-size:15px}
table{width:100%;border-collapse:collapse;font-size:16px}
td,th{padding:8px 6px;border-bottom:1px solid #2a3248;text-align:left}
th{color:var(--mut);font-size:13px}
.wchars{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:16px 0}
.wbox{background:#f7f3ec;border-radius:10px;position:relative}
.tag{font-size:11px;background:var(--card2);color:var(--mut);border-radius:6px;padding:2px 7px}
.fb{text-align:center;font-size:18px;margin-top:12px;min-height:26px}
.tonegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:14px 0}
.tonegrid .btn{font-size:18px;padding:14px}
@media(max-width:600px){.big{font-size:46px}.opts{grid-template-columns:1fr}}
</style>
</head>

<h1>中文 <span>Trainer</span></h1>

const out=[];

const m=chunk.match(SYL);

}

}).join("");
}

const q=($("#wsearch").value||"").toLowerCase();
$("#wtbody").innerHTML=W.map((w,i)=>({w,i})).filter(({w})=>!q||w[0].includes(q)||T(w[0]).includes(q)||w[1].toLowerCase().includes(q)||plainPinyin(w[1]).includes(q)||w[2].toLowerCase().includes(q))
.map(({w,i})=>`<tr><td>${isLearned(i)?"✅":""}</td><td class="hanzi" style="font-size:20px">${T(w[0])}</td><td>${pinHTML(w[1])}</td><td>${esc(w[2])}</td><td class="mut">${w[3]}</td><td><button class="btn sm" onclick="speak(W[${i}][0])">🔊</button></td></tr>`).join("");
}

renderNav();renderScriptBtn();renderStreak();render();
</script>
