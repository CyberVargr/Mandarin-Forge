<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>中文 Coach — Taiwan Edition</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
<style>
:root{--bg:#10141c;--card:#1a2030;--card2:#222a3e;--txt:#e8ecf4;--mut:#8a94ab;--acc:#e4593b;--green:#3fae6a;--red:#d24545;--gold:#e0a93c;--blue:#4f8fe8;--purple:#9a6fe0;--teal:#3fb8ae}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh}
.hanzi{font-family:"Microsoft JhengHei","Noto Sans TC","Microsoft YaHei","Noto Sans SC","PingFang TC",sans-serif}
header{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid #2a3248;flex-wrap:wrap}
header h1{font-size:19px;white-space:nowrap}
header h1 span{color:var(--acc)}
nav{display:flex;gap:5px;flex-wrap:wrap}
nav button{background:none;border:1px solid #2a3248;color:var(--mut);padding:6px 10px;border-radius:8px;cursor:pointer;font-size:13px}
nav button.on{background:var(--acc);border-color:var(--acc);color:#fff}
#scriptBtn{background:var(--card2);border:1px solid #34405e;color:var(--gold);padding:6px 11px;border-radius:8px;cursor:pointer;font-size:13px}
#hud{margin-left:auto;display:flex;gap:10px;align-items:center;font-size:13px;color:var(--gold);font-weight:600;white-space:nowrap}
#sessbar{display:none;position:sticky;top:0;z-index:50;background:#23192b;border-bottom:2px solid var(--acc);padding:10px 18px}
#sessbar b{color:var(--gold)}
#sessleft{font-variant-numeric:tabular-nums;font-size:18px;font-weight:700}
#sessleft.over{color:var(--red);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.4}}
.sbar{flex:1;height:8px;background:#3a2f45;border-radius:4px;overflow:hidden;min-width:80px}
.sbar i{display:block;height:100%;background:var(--acc)}
main{max-width:880px;margin:0 auto;padding:20px 16px 60px}
.box{background:var(--card);border:1px solid #2a3248;border-radius:14px;padding:20px;margin-bottom:16px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{background:var(--card2);border:1px solid #34405e;color:var(--txt);padding:10px 18px;border-radius:9px;cursor:pointer;font-size:15px}
.btn:hover{border-color:var(--acc)}
.btn.acc{background:var(--acc);border-color:var(--acc);color:#fff}
.btn.grn{background:var(--green);border-color:var(--green);color:#fff}
.btn.red{background:var(--red);border-color:var(--red);color:#fff}
.btn.sm{padding:5px 10px;font-size:13px}
.btn.big{font-size:20px;padding:14px 28px}
.btn:disabled{opacity:.55;cursor:default}
.bigh{font-size:60px;text-align:center;line-height:1.3;margin:14px 0}
.pin{font-size:23px;text-align:center;color:var(--gold);margin:6px 0}
.eng{font-size:18px;text-align:center;margin:6px 0}
.mut{color:var(--mut)}.gold{color:var(--gold)}.grn-t{color:var(--green)}.red-t{color:var(--red)}
.center{text-align:center}
.t1{color:#ff7066}.t2{color:#5dd47a}.t3{color:#5aa8ff}.t4{color:#c98bff}.t5{color:#9aa3b5}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.opts .btn{padding:15px;font-size:17px}
.opts .btn.hit{background:var(--green);border-color:var(--green);color:#fff}
.opts .btn.miss{background:var(--red);border-color:var(--red);color:#fff}
input[type=text],input[type=number],select{background:var(--card2);border:1px solid #34405e;color:var(--txt);padding:10px 12px;border-radius:8px;font-size:17px}
input[type=text]{width:100%}
.stat{display:inline-block;background:var(--card2);border-radius:10px;padding:11px 16px;margin:4px;text-align:center;min-width:92px}
.stat b{display:block;font-size:24px}
.stat span{font-size:11px;color:var(--mut)}
.set{display:flex;gap:8px;align-items:center;font-size:14px}
table{width:100%;border-collapse:collapse;font-size:16px}
td,th{padding:8px 6px;border-bottom:1px solid #2a3248;text-align:left}
th{color:var(--mut);font-size:13px}
tr.wrow{cursor:pointer}
tr.wrow:hover td{background:#1f2740}
.wchars{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:16px 0}
.wbox{background:#f7f3ec;border-radius:10px}
.tag{font-size:11px;background:var(--card2);color:var(--mut);border-radius:6px;padding:2px 7px}
.tag.p{color:var(--purple);border:1px solid var(--purple)}
.tag.tw{color:var(--teal);border:1px solid var(--teal)}
.fb{text-align:center;font-size:18px;margin-top:12px;min-height:26px}
.tonegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin:14px 0}
.heat{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,13px);gap:3px;justify-content:start;margin:10px 0}
.heat i{width:13px;height:13px;border-radius:3px;background:#222a3e}
.heat i.h1{background:#3a4a3f}.heat i.h2{background:#3f7a52}.heat i.h3{background:#3fae6a}.heat i.h4{background:#7ce0a3}
.xpbar{height:10px;background:var(--card2);border-radius:5px;overflow:hidden;margin:6px 0}
.xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--acc))}
.bub{max-width:75%;padding:10px 14px;border-radius:14px;margin:6px 0;font-size:17px;line-height:1.6;cursor:pointer}
.bub.a{background:var(--card2);border-bottom-left-radius:4px;margin-right:auto}
.bub.b{background:#2b3a2e;border-bottom-right-radius:4px;margin-left:auto;text-align:right}
.bub .bp{font-size:14px;display:block}
.bub .be{font-size:13px;color:var(--mut);display:block}
.bub.cur{outline:2px solid var(--acc)}
.tiles{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:12px 0;min-height:54px}
.tile{background:var(--card2);border:1px solid #34405e;border-radius:9px;padding:10px 14px;font-size:22px;cursor:pointer}
.tile:hover{border-color:var(--acc)}
.tile.ghost{opacity:.25;pointer-events:none}
.slotline{background:#141927;border:1px dashed #34405e;border-radius:10px;padding:10px;min-height:58px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.dlgcard{cursor:pointer;transition:border-color .15s}
.dlgcard:hover{border-color:var(--acc)}
.spk-ch{font-size:26px;letter-spacing:2px}
.spk-ch .ok{color:var(--green)}.spk-ch .bad{color:var(--red)}
.note{font-size:13.5px;color:#c4cce0;background:#141927;border-left:3px solid var(--teal);border-radius:8px;padding:9px 12px;margin:8px auto;max-width:600px;text-align:left;line-height:1.55}
.note.cult{border-left-color:var(--gold)}
.brk{font-size:14px;background:#141927;border-left:3px solid var(--purple);border-radius:8px;padding:9px 12px;margin:8px auto;max-width:600px;text-align:left;line-height:1.6}
.brk b{font-size:21px;color:var(--gold)}
.radcard{display:flex;gap:14px;align-items:flex-start}
.radglyph{font-size:44px;min-width:74px;text-align:center;background:#141927;border-radius:10px;padding:8px;color:var(--gold)}
.glyph{color:var(--gold);margin-right:3px}
.subT{font-size:10px;letter-spacing:3px;color:var(--purple);text-transform:uppercase;align-self:center}
.modegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:12px}
.modegrid .btn{padding:14px;text-align:center}
.modegrid small{display:block;color:var(--mut);font-size:11px;margin-top:4px;font-weight:400}
.psbrow{border-bottom:1px solid #2a3248;padding:10px 4px}
.psbrow .hz{font-size:20px}
.psbrow .pp{font-size:14px}
.psbrow .ee{font-size:13px;color:var(--mut)}
.chip{display:inline-block;background:var(--card2);border:1px solid #34405e;color:var(--mut);border-radius:14px;padding:4px 11px;font-size:12px;cursor:pointer;margin:2px}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff}
.diff{color:var(--gold);font-size:12px}
.bopo{font-size:15px;color:var(--teal);letter-spacing:2px;margin:2px 0;text-align:center}
.career-it{border-bottom:1px solid #2a3248;padding:9px 4px}
.logcard{border-left:3px solid var(--gold)}
.misstab td{font-size:14px}
@media(max-width:640px){.bigh{font-size:44px}.opts{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1>中文 <span>Coach</span> <span style="font-size:12px;color:var(--teal)">TW</span></h1>
<span class="subT">ᚠ Forgebound</span>
<nav id="nav"></nav>
<button id="scriptBtn" onclick="toggleScript()"></button>
<div id="hud"></div>
</header>
<div id="sessbar"></div>
<main id="main"></main>
<script>
/* =============================================================
   中文 Coach v4 — TAIWAN EDITION (built from MASTER-PROMPT.md)
   Learner: Clark — Taipei-based gaming product marketer/copywriter
   (Acer Predator, 10 yrs). Traditional-first, Taiwan usage,
   cultural notes, radical mnemonics.
   Data stored in simplified codepoints; OpenCC renders 繁體.
   ============================================================= */
/* ============ VOCAB [hanzi, pinyin, english, level, extra?]
   extra = {tw:[hanzi,pinyin], n:"note"} ============ */
const W=[
["爱","ài","to love",1,{n:"Traditional 愛 keeps 心 the heart in the middle — you cannot love without a heart. (Simplified famously removed it.)",ex:"我愛我的家人。"}],
["八","bā","eight",1,{n:"8 is the lucky number — bā sounds like 發 fā, getting rich. Phone numbers and prices with 8 cost more!",ex:"我家有八個人。"}],
["爸爸","bàba","dad",1,{ex:"我爸爸每天開車去上班。"}],
["杯子","bēizi","cup; glass",1,{ex:"這個杯子是我的。"}],
["北京","Běijīng","Beijing",1,{ex:"我還沒有去過北京。"}],
["本","běn","(measure for books)",1,{ex:"我買了一本中文書。"}],
["不","bù","not; no",1,{n:"Tone change: 不 becomes bú before 4th tone — 不是 bú shì.",ex:"我不喝咖啡。"}],
["不客气","bú kèqi","you're welcome",1,{tw:["不会","bú huì"],n:"In Taiwan the everyday reply to 謝謝 is 不會 — literally won't (trouble me). 不客氣 is understood but sounds formal.",ex:"謝謝你！不會、不會！"}],
["菜","cài","dish; vegetable",1,{ex:"這道菜非常好吃。"}],
["茶","chá","tea",1,{ex:"我每天喝一杯茶。"}],
["吃","chī","to eat",1,{ex:"你吃飯了嗎？"}],
["出租车","chūzūchē","taxi",1,{tw:["计程车","jìchéngchē"],n:"Taiwan taxis are 計程車 (meter-counting cars) — all yellow, so locals say 小黃 xiǎohuáng, little yellow.",ex:"我叫了一台計程車。"}],
["打电话","dǎ diànhuà","to make a phone call",1,{ex:"我要打電話給客戶。"}],
["大","dà","big",1,{ex:"台北是一個很大的城市。"}],
["的","de","(possessive 's)",1,{ex:"這是我的電腦。"}],
["点","diǎn","o'clock; dot",1,{ex:"現在三點半了。"}],
["电脑","diànnǎo","computer",1,{n:"Electric brain! 電 lightning + 腦 brain. Taiwan and the mainland agree on this one.",ex:"我每天用電腦工作。"}],
["电视","diànshì","TV",1,{ex:"他喜歡看電視。"}],
["电影","diànyǐng","movie",1,{ex:"我們今晚去看電影吧。"}],
["东西","dōngxi","thing",1,{n:"Literally east-west — going to market meant going east and west. Calling a person a 東西 is an insult!",ex:"你桌上的東西是什麼？"}],
["都","dōu","all; both",1,{ex:"我們都喜歡吃夜市。"}],
["读","dú","to read",1,{ex:"我在讀一本新書。"}],
["对不起","duìbuqǐ","sorry",1,{ex:"對不起，我來晚了。"}],
["多","duō","many; much",1,{ex:"夜市的人很多。"}],
["多少","duōshao","how many; how much",1,{ex:"這個多少錢？"}],
["儿子","érzi","son",1,{ex:"他有一個兒子。"}],
["二","èr","two",1,{n:"Two has two readings: 二 èr for counting, 兩 liǎng before measure words — 兩個人 two people.",ex:"我住在二樓。"}],
["饭店","fàndiàn","restaurant; hotel",1,{n:"In Taiwan 飯店 usually means HOTEL; a restaurant is 餐廳 cāntīng.",ex:"我訂了一間飯店。"}],
["飞机","fēijī","airplane",1,{ex:"我要坐飛機去日本。"}],
["分钟","fēnzhōng","minute",1,{ex:"捷運十五分鐘就到了。"}],
["高兴","gāoxìng","happy",1,{ex:"見到你我很高興。"}],
["个","gè","(general measure word)",1,{ex:"我要兩個便當。"}],
["工作","gōngzuò","work; job",1,{ex:"我的工作是行銷文案。"}],
["狗","gǒu","dog",1,{ex:"他養了一隻狗。"}],
["汉语","Hànyǔ","Chinese (language)",1,{tw:["中文","Zhōngwén"],n:"Taiwan says 中文 or 國語; 漢語 sounds academic/mainland. Say 我會說中文.",ex:"我在學中文。"}],
["好","hǎo","good",1,{ex:"你今天好嗎？"}],
["号","hào","date; number",1,{ex:"今天是幾月幾號？"}],
["喝","hē","to drink",1,{ex:"你要喝什麼？"}],
["和","hé","and; with",1,{n:"In Taiwan often pronounced hàn — a famous cross-strait difference. Both are understood.",ex:"我和朋友去吃夜市。"}],
["很","hěn","very",1,{ex:"這個滷肉飯很好吃。"}],
["后面","hòumiàn","behind",1,{ex:"廁所在後面。"}],
["回","huí","to return",1,{ex:"我七點回家。"}],
["会","huì","can; know how to",1,{ex:"我會說中文。"}],
["火车站","huǒchēzhàn","train station",1,{n:"In Taiwan: 台鐵 (regular rail) vs 高鐵 gāotiě, the high-speed rail down the west coast.",ex:"台北車站在哪裡？"}],
["几","jǐ","how many; a few",1,{ex:"你家有幾個人？"}],
["家","jiā","home; family",1,{ex:"我家在台北東區。"}],
["叫","jiào","to be called",1,{ex:"我叫Clark，很高興認識你。"}],
["今天","jīntiān","today",1,{ex:"今天天氣很好。"}],
["九","jiǔ","nine",1,{ex:"會議九點開始。"}],
["开","kāi","to open; to drive",1,{ex:"請開門，謝謝。"}],
["看","kàn","to look; to watch",1,{ex:"你看過這部電影嗎？"}],
["看见","kànjiàn","to see",1,{ex:"我在便利商店看見他。"}],
["块","kuài","dollar; piece",1,{n:"In Taiwan prices are NT$ (新台幣 xīn táibì). 塊 = one NT dollar. Lunch box ≈ 100塊, bubble tea ≈ 60塊.",ex:"這個便當五十塊。"}],
["来","lái","to come",1,{ex:"你什麼時候來台灣的？"}],
["老师","lǎoshī","teacher",1,{ex:"我的中文老師教得很好。"}],
["了","le","(completed action)",1,{ex:"我吃完飯了。"}],
["冷","lěng","cold",1,{ex:"冷氣太冷了。"}],
["里","lǐ","inside",1,{ex:"包包裡有什麼？"}],
["六","liù","six",1,{n:"66 = 六六大順, everything smooth — another lucky number.",ex:"今天禮拜六。"}],
["妈妈","māma","mom",1,{ex:"我媽媽很會做菜。"}],
["吗","ma","(yes/no question)",1,{ex:"你吃飽了嗎？"}],
["买","mǎi","to buy",1,{ex:"我要去買新手機。"}],
["猫","māo","cat",1,{ex:"她養了兩隻貓。"}],
["没关系","méi guānxi","it's OK; no problem",1,{ex:"沒關係，你慢慢來。"}],
["没有","méiyǒu","to not have",1,{ex:"我今天沒有時間。"}],
["米饭","mǐfàn","cooked rice",1,{ex:"你要不要加米飯？"}],
["明天","míngtiān","tomorrow",1,{ex:"明天我要去面試。"}],
["名字","míngzi","name",1,{ex:"你的名字怎麼寫？"}],
["哪","nǎ","which",1,{ex:"你想去哪個夜市？"}],
["哪儿","nǎr","where",1,{tw:["哪里","nǎlǐ"],n:"Taiwan drops the Beijing 兒 (-r) endings: say 哪裡, not 哪兒. Same for 一點 (not 一點兒).",ex:"廁所在哪裡？"}],
["那","nà","that",1,{ex:"那間咖啡廳看起來不錯。"}],
["呢","ne","(what about...?)",1,{ex:"你呢？你喜歡什麼？"}],
["能","néng","can; be able to",1,{ex:"你能幫我一下嗎？"}],
["你","nǐ","you",1,{ex:"你好，我叫Clark。"}],
["年","nián","year",1,{ex:"我在台灣住了三年了。"}],
["女儿","nǚ'ér","daughter",1,{ex:"她有一個可愛的女兒。"}],
["朋友","péngyou","friend",1,{ex:"他是我最好的朋友。"}],
["漂亮","piàoliang","pretty",1,{ex:"這件衣服很漂亮。"}],
["苹果","píngguǒ","apple",1,{ex:"我喜歡吃蘋果。"}],
["七","qī","seven",1,{ex:"我每天七點起床。"}],
["前面","qiánmiàn","in front",1,{ex:"捷運站在前面。"}],
["钱","qián","money",1,{ex:"你帶錢了嗎？"}],
["请","qǐng","please; to invite",1,{n:"請 also means to treat: 我請你 = my treat! Important word in Taiwanese politeness.",ex:"請進，請坐。"}],
["去","qù","to go",1,{ex:"我們去吃飯吧。"}],
["热","rè","hot",1,{ex:"台北夏天很熱。"}],
["人","rén","person",1,{ex:"夜市的人很多。"}],
["认识","rènshi","to know (someone)",1,{ex:"很高興認識你。"}],
["三","sān","three",1,{ex:"我要三杯珍珠奶茶。"}],
["商店","shāngdiàn","shop; store",1,{ex:"附近有便利商店嗎？"}],
["上","shàng","up; on; above",1,{ex:"書在桌子上。"}],
["上午","shàngwǔ","morning (a.m.)",1,{ex:"上午十點我有會議。"}],
["少","shǎo","few; little",1,{ex:"今天來的人比較少。"}],
["谁","shéi","who",1,{n:"Taiwan prefers the reading shuí; mainland says shéi. Both written 誰.",ex:"你旁邊的人是誰？"}],
["什么","shénme","what",1,{ex:"你在想什麼？"}],
["十","shí","ten",1,{ex:"我在這家公司工作了十年。"}],
["时候","shíhou","time; moment",1,{ex:"你什麼時候有空？"}],
["是","shì","to be",1,{ex:"我是行銷文案。"}],
["书","shū","book",1,{ex:"我在讀一本中文書。"}],
["水","shuǐ","water",1,{ex:"你要喝水嗎？"}],
["水果","shuǐguǒ","fruit",1,{n:"Taiwan is a fruit kingdom — mango 芒果, pineapple 鳳梨 (mainland: 菠蘿), wax apple 蓮霧.",ex:"台灣的水果很甜。"}],
["睡觉","shuìjiào","to sleep",1,{ex:"我每天十一點睡覺。"}],
["说","shuō","to speak",1,{ex:"你會說中文嗎？"}],
["四","sì","four",1,{n:"Unlucky — sì sounds like 死 sǐ death. Buildings skip 4th floors; never gift 4 of anything.",ex:"這棟樓沒有四樓。"}],
["岁","suì","years old",1,{ex:"你幾歲？"}],
["他","tā","he; him",1,{ex:"他是我的同事。"}],
["她","tā","she; her",1,{ex:"她是我的主管。"}],
["太","tài","too (much)",1,{ex:"今天太忙了。"}],
["天气","tiānqì","weather",1,{ex:"台北的天氣變化很快。"}],
["听","tīng","to listen",1,{ex:"我喜歡聽音樂。"}],
["同学","tóngxué","classmate",1,{ex:"他是我的大學同學。"}],
["喂","wéi","hello (on the phone)",1,{ex:"喂，你好，我是Clark。"}],
["我","wǒ","I; me",1,{ex:"我是行銷文案。"}],
["我们","wǒmen","we; us",1,{ex:"我們公司在台北。"}],
["五","wǔ","five",1,{ex:"我每週工作五天。"}],
["喜欢","xǐhuan","to like",1,{ex:"我喜歡吃台灣小吃。"}],
["下","xià","down; under; next",1,{ex:"樓下有便利商店。"}],

function computeBrain(){
const toneCounts={1:0,2:0,3:0,4:0};
const typeCounts={};
const typeMap={card:"card",listening:"listen",listen:"listen",tone:"tone",typing:"type",type:"type",writing:"speak",speak:"speak",quiz:"listen",dialogue:"listen",radical:"card",number:"type"};
Object.values(st.mistakes).forEach(m=>{
if(m.tones)Object.entries(m.tones).forEach(([t,n])=>{if(toneCounts[+t]!==undefined)toneCounts[+t]+=n});
Object.entries(m.kinds||{}).forEach(([k,n])=>{const nk=typeMap[k]||k;typeCounts[nk]=(typeCounts[nk]||0)+n});
});
const toneTotal=Object.values(toneCounts).reduce((a,b)=>a+b,0);
const toneAvg=toneTotal/4;
const weakTones=Object.entries(toneCounts).filter(([,n])=>n>toneAvg).sort((a,b)=>b[1]-a[1]).map(([t])=>+t);
const typeVals=Object.values(typeCounts);
const typeAvg=typeVals.length?typeVals.reduce((a,b)=>a+b,0)/typeVals.length:0;
const weakTypes=Object.entries(typeCounts).filter(([,n])=>n>typeAvg).sort((a,b)=>b[1]-a[1]).map(([t])=>t);
const soon=now()+2*DAY;
const mm=missMap();
const atRiskWords=W.map((w,i)=>i).filter(i=>{const c=st.cards[i];return c&&c.reps>0&&c.due<=soon&&(mm[i]||0)>=2}).sort((a,b)=>(mm[b]||0)-(mm[a]||0)).slice(0,5);
const log=st.lessonLog||[];
const d7=new Date(now()-7*DAY).toISOString().slice(0,10);
const d14=new Date(now()-14*DAY).toISOString().slice(0,10);
const last7=log.filter(e=>e.date>=d7);
const prior7=log.filter(e=>e.date>=d14&&e.date<d7);
const avgW=arr=>arr.length?arr.reduce((a,e)=>a+(e.weak?e.weak.length:0),0)/arr.length:0;
const lw=avgW(last7),pw=avgW(prior7);
let trend="stable";
if(last7.length>=2&&prior7.length>=2){if(lw<pw*0.8)trend="improving";else if(lw>pw*1.2)trend="declining"}
return {weakTones,weakTypes,atRiskWords,trend};
}

const l=lcs([...tgt],[...got]);

let bq=null;
function genBoss(n){
const qs=[];const pool=lPool();
for(let k=0;k<n;k++){
const ty=rnd(["aw","eh","tn","as"]);
if(ty==="aw"){const qi=rnd(pool);
const confused=sessionConfusedIds().filter(i=>i!==qi&&W[i][2]!==W[qi][2]);
const fallback=shuffle(pool.filter(i=>i!==qi&&W[i][2]!==W[qi][2]&&!confused.includes(i)));
const dis=shuffle(confused.concat(fallback)).slice(0,3);
const opts=shuffle([{l:W[qi][2],ok:1},...dis.map(i=>({l:W[i][2],ok:0}))]);
qs.push({ty,prompt:"🔊 Listen — what does it mean?",audio:wHanzi(W[qi]),hz:wHanzi(W[qi]),pin:wPin(W[qi]),opts,qi});}
else if(ty==="eh"){const qi=rnd(pool);
const confused2=sessionConfusedIds().filter(i=>i!==qi&&wHanzi(W[i])!==wHanzi(W[qi]));
const fallback2=shuffle(pool.filter(i=>i!==qi&&wHanzi(W[i])!==wHanzi(W[qi])&&!confused2.includes(i)));
const dis=shuffle(confused2.concat(fallback2)).slice(0,3);
const opts=shuffle([{l:wHanzi(W[qi]),ok:1,hz:1},...dis.map(i=>({l:wHanzi(W[i]),ok:0,hz:1}))]);
qs.push({ty,prompt:'Which is “'+W[qi][2]+'”?',audio:null,hz:wHanzi(W[qi]),pin:wPin(W[qi]),opts,qi});}
else if(ty==="tn"){const qi=rnd(pool);const t=tone(syls(wPin(W[qi]))[0]||"");
const opts=[1,2,3,4,5].map(x=>({l:x===5?"neutral":"tone "+x,ok:x===t?1:0}));
qs.push({ty,prompt:"🔊 Tone of the first syllable?",audio:wHanzi(W[qi]),hz:wHanzi(W[qi]),pin:wPin(W[qi]),opts,qi});}
else{const qi=Math.floor(Math.random()*S.length);const dis=shuffle(S.filter((s,i)=>i!==qi)).slice(0,3);
const opts=shuffle([{l:S[qi][2],ok:1},...dis.map(s=>({l:s[2],ok:0}))]);
qs.push({ty,prompt:"🔊 Listen to the sentence — what does it mean?",audio:S[qi][0],hz:S[qi][0],pin:S[qi][1],opts});}
}
return qs;
}
